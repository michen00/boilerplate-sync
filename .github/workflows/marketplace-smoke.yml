---
# Consumes the PUBLISHED action by tag, exactly as a stranger would, to catch
# a botched release (missing dist/, broken action.yml, or a stale @v1 alias)
# before a user does. It cannot gate a PR: `uses:` always resolves the live
# tag, not the PR's code, and takes no `${{ }}` expression. So it runs after a
# release, on demand, and weekly as a canary against tag rot. On a real
# release it also exercises the just-published tag (checked out and run from a
# path, since `uses:` cannot interpolate the tag), so a bad new tag like
# v1.0.1 can't slip through while the @v1 alias still points at the old one.
name: Marketplace smoke

on:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1' # Mondays 12:00 UTC

permissions:
  contents: read

jobs:
  consume-published-tag:
    name: Consume published tag
    runs-on: ubuntu-latest
    # No checkout: a bare workspace proves the published dist/ runs on its own
    # and can never fall back to a locally built action.
    steps:
      - name: Consume @v1 (floating alias the README advertises)
        id: v1
        uses: michen00/boilerplate-sync@v1.0.4
        with:
          sources: |
            - source: actions/checkout
              file_pairs:
                - local_path: .smoke-v1-license
                  source_path: LICENSE
          github-token: ${{ github.token }}
          create-missing: 'true'

      - name: Verify @v1 result
        env:
          REF: '@v1'
          FILE: .smoke-v1-license
          HAS_CHANGES: ${{ steps.v1.outputs.has-changes }}
          UPDATED_COUNT: ${{ steps.v1.outputs.updated-count }}
          FAILED_COUNT: ${{ steps.v1.outputs.failed-count }}
        run: |
          echo "$REF: has-changes=$HAS_CHANGES updated=$UPDATED_COUNT failed=$FAILED_COUNT"
          if [ "$HAS_CHANGES" != "true" ]; then
            echo "::error::$REF expected has-changes=true"
            exit 1
          fi
          if [ "$UPDATED_COUNT" != "1" ]; then
            echo "::error::$REF expected updated-count=1"
            exit 1
          fi
          if [ "$FAILED_COUNT" != "0" ]; then
            echo "::error::$REF expected failed-count=0"
            exit 1
          fi
          if [ ! -s "$FILE" ]; then
            echo "::error::$REF synced file missing or empty"
            exit 1
          fi
          if ! grep -q "MIT License" "$FILE"; then
            echo "::error::$REF synced file lacks upstream content"
            exit 1
          fi
          rm "$FILE"

      - name: Consume @v1.0.0 (immutable tag)
        id: v100
        uses: michen00/boilerplate-sync@v1.0.4
        with:
          sources: |
            - source: actions/checkout
              file_pairs:
                - local_path: .smoke-v100-license
                  source_path: LICENSE
          github-token: ${{ github.token }}
          create-missing: 'true'

      - name: Verify @v1.0.0 result
        env:
          REF: '@v1.0.0'
          FILE: .smoke-v100-license
          HAS_CHANGES: ${{ steps.v100.outputs.has-changes }}
          UPDATED_COUNT: ${{ steps.v100.outputs.updated-count }}
          FAILED_COUNT: ${{ steps.v100.outputs.failed-count }}
        run: |
          echo "$REF: has-changes=$HAS_CHANGES updated=$UPDATED_COUNT failed=$FAILED_COUNT"
          if [ "$HAS_CHANGES" != "true" ]; then
            echo "::error::$REF expected has-changes=true"
            exit 1
          fi
          if [ "$UPDATED_COUNT" != "1" ]; then
            echo "::error::$REF expected updated-count=1"
            exit 1
          fi
          if [ "$FAILED_COUNT" != "0" ]; then
            echo "::error::$REF expected failed-count=0"
            exit 1
          fi
          if [ ! -s "$FILE" ]; then
            echo "::error::$REF synced file missing or empty"
            exit 1
          fi
          if ! grep -q "MIT License" "$FILE"; then
            echo "::error::$REF synced file lacks upstream content"
            exit 1
          fi
          rm "$FILE"

      # On a real release, also consume the just-published tag, not only the
      # @v1 alias / immutable v1.0.0 above. `uses:` takes no expression, so
      # check the tag out and run it from a path.
      - name: Check out the released tag
        if: github.event_name == 'release'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.release.tag_name }}
          path: ._released

      - name: Consume the released tag
        id: released
        if: github.event_name == 'release'
        uses: ./._released
        with:
          sources: |
            - source: actions/checkout
              file_pairs:
                - local_path: .smoke-released-license
                  source_path: LICENSE
          github-token: ${{ github.token }}
          create-missing: 'true'

      - name: Verify released-tag result
        if: github.event_name == 'release'
        env:
          REF: ${{ github.event.release.tag_name }}
          FILE: .smoke-released-license
          HAS_CHANGES: ${{ steps.released.outputs.has-changes }}
          UPDATED_COUNT: ${{ steps.released.outputs.updated-count }}
          FAILED_COUNT: ${{ steps.released.outputs.failed-count }}
        run: |
          echo "$REF: has-changes=$HAS_CHANGES updated=$UPDATED_COUNT failed=$FAILED_COUNT"
          if [ "$HAS_CHANGES" != "true" ]; then
            echo "::error::$REF expected has-changes=true"
            exit 1
          fi
          if [ "$UPDATED_COUNT" != "1" ]; then
            echo "::error::$REF expected updated-count=1"
            exit 1
          fi
          if [ "$FAILED_COUNT" != "0" ]; then
            echo "::error::$REF expected failed-count=0"
            exit 1
          fi
          if [ ! -s "$FILE" ]; then
            echo "::error::$REF synced file missing or empty"
            exit 1
          fi
          if ! grep -q "MIT License" "$FILE"; then
            echo "::error::$REF synced file lacks upstream content"
            exit 1
          fi
          rm "$FILE"
