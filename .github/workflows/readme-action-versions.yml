---
name: README action versions

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-action-versions
  cancel-in-progress: true

env:
  BRANCH_NAME: chore/readme-action-versions
  # secrets aren't allowed in if: expressions (actionlint enforces it);
  # hoist presence here.
  APP_KEY_SET: ${{ secrets.APP_PRIVATE_KEY != '' }}

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update README action versions
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/update-readme-action-versions.sh

      # App token so the PR fires CI and can auto-merge hands-free, exactly
      # like bot-automerge's dist commits. Falls back to GITHUB_TOKEN (the PR
      # opens but waits for a manual merge) when the App is unconfigured.
      - name: Mint app token
        id: app-token
        if: steps.bump.outputs.changed == 'true' && vars.APP_ID != '' && env.APP_KEY_SET == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Open pull request
        id: cpr
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          delete-branch: true
          base: main
          sign-commits: true
          title: 'docs(README): bump action versions in examples'
          commit-message: 'docs(README): bump action versions in examples'
          body: |
            A referenced action published a newer major (or this action cut a
            new release), so the version pins in the README examples are
            behind. Regenerated by `scripts/update-readme-action-versions.sh`.

      # Approve as github-actions[bot] (distinct from the App-bot author) and
      # arm auto-merge -- only when the App token fired CI, else leave it for
      # a maintainer since required checks won't report on a GITHUB_TOKEN push.
      - name: Approve and enable auto-merge
        if: steps.cpr.outputs.pull-request-number != '' && steps.app-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          # Only approve if not already approved, so reruns don't add noisy
          # duplicate reviews (mirrors bot-automerge.yml).
          decision=$(gh pr view "$PR_NUMBER" --json reviewDecision -q .reviewDecision)
          if [ "$decision" != "APPROVED" ]; then
            gh pr review --approve "$PR_NUMBER"
          fi
          gh pr merge --auto --squash "$PR_NUMBER"
